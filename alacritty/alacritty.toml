# Obsidian
# Fondo neutro puro (sin tintes azules) · pensado para queratocono
# Cyan #00C8A0 · Lime #78E030 · Rose #E04870 · Green #2ED870
# bg: #0A0A0A  fg: #C4CDB8 (blanco cálido, sin halo azul)

[colors.primary]
background = "0x0a0a0a"
foreground = "0xc4cdb8"

[colors.normal]
black   = "0x0a0a0a"
red     = "0xd02848"
green   = "0x2ed870"
yellow  = "0xc8a018"
blue    = "0x00c8a0"
magenta = "0xe04870"
cyan    = "0x78e030"
white   = "0xc4cdb8"

[colors.bright]
black   = "0x3a4a38"
red     = "0xe04060"
green   = "0x50f088"
yellow  = "0xe8c030"
blue    = "0x20e8b8"
magenta = "0xf06888"
cyan    = "0x98f050"
white   = "0xdce8d0"

[colors.selection]
background = "0x1a2018"
foreground = "0xc4cdb8"

[cursor]
style = "Block"

[font.bold]
family = "IosevkaTerm Nerd Font"
style = "Bold"

[font.italic]
family = "IosevkaTerm Nerd Font"
style = "Italic"

[font.normal]
family = "IosevkaTerm Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control"

[scrolling]
history = 10000
multiplier = 3

[terminal.shell]
args = ["--login", "-c", "tmux a 2>/dev/null || tmux"]
program = "/usr/bin/zsh"

[window]
decorations = "full"
opacity = 0.92
blur = true

[window.dimensions]
columns = 80
lines = 24

[window.padding]
x = 8
y = 8

[keyboard]
