# Everforest Dark Hard
# Tema warm/café, armónico, fácil para ojos
# bg: #272e33 · fg: #d3c6aa · green: #a7c080 · aqua: #83c092

[colors.primary]
background = "0x272e33"
foreground = "0xd3c6aa"

[colors.normal]
black   = "0x272e33"
red     = "0xe67e80"
green   = "0xa7c080"
yellow  = "0xdbbc7f"
blue    = "0x7fbbb3"
magenta = "0xd699b6"
cyan    = "0x83c092"
white   = "0xd3c6aa"

[colors.bright]
black   = "0x475258"
red     = "0xe67e80"
green   = "0xa7c080"
yellow  = "0xdbbc7f"
blue    = "0x7fbbb3"
magenta = "0xd699b6"
cyan    = "0x83c092"
white   = "0xd3c6aa"

[colors.selection]
background = "0x3d4a4f"
foreground = "0xd3c6aa"

[cursor]
style = "Block"

[font.bold]
family = "IosevkaTerm Nerd Font"
style = "Bold"

[font.italic]
family = "IosevkaTerm Nerd Font"
style = "Italic"

[font.normal]
family = "IosevkaTerm Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control"

[scrolling]
history = 10000
multiplier = 3

[terminal.shell]
args = ["--login", "-c", "tmux a 2>/dev/null || tmux"]
program = "/usr/bin/zsh"

[window]
decorations = "full"
opacity = 0.92
blur = true

[window.dimensions]
columns = 80
lines = 24

[window.padding]
x = 8
y = 8

[keyboard]
