# Trae Dark
# Paleta armónica centrada en #32F08C (verde Trae)

[colors.primary]
background = "0x0a0e14"
foreground = "0xc5d8ea"

[colors.normal]
black   = "0x0a0e14"
red     = "0xf05a72"
green   = "0x32f08c"
yellow  = "0xedd040"
blue    = "0x38b0f0"
magenta = "0xa07aef"
cyan    = "0x2dd4bf"
white   = "0xc5d8ea"

[colors.bright]
black   = "0x4a6070"
red     = "0xf07a8a"
green   = "0x50f8a0"
yellow  = "0xf8e060"
blue    = "0x60c8f8"
magenta = "0xbf9af8"
cyan    = "0x50e8dc"
white   = "0xe0ecfa"

[colors.selection]
background = "0x1e3048"
foreground = "0xc5d8ea"

[cursor]
style = "Block"

[font.bold]
family = "IosevkaTerm Nerd Font"
style = "Bold"

[font.italic]
family = "IosevkaTerm Nerd Font"
style = "Italic"

[font.normal]
family = "IosevkaTerm Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control"

[scrolling]
history = 10000
multiplier = 3

[terminal.shell]
args = ["--login", "-c", "tmux a 2>/dev/null || tmux"]
program = "/usr/bin/zsh"

[window]
decorations = "full"
opacity = 0.92
blur = true

[window.dimensions]
columns = 80
lines = 24

[window.padding]
x = 8
y = 8

[keyboard]
