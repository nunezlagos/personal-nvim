# Everforest Dark — fondo neutro puro
# bg: #141414 (negro puro, sin filtro) · colores Everforest en la sintaxis
# fg: #d3c6aa · green: #a7c080 · aqua: #83c092

[colors.primary]
background = "0x141414"
foreground = "0xd5c8a5"

[colors.normal]
black   = "0x141414"
red     = "0xe86262"
green   = "0x98c870"
yellow  = "0xdcb860"
blue    = "0x65bfb8"
magenta = "0xd87fad"
cyan    = "0x68cc88"
white   = "0xd5c8a5"

[colors.bright]
black   = "0x5a5a5a"
red     = "0xec7878"
green   = "0xaad882"
yellow  = "0xe8cc70"
blue    = "0x78ccc5"
magenta = "0xe090be"
cyan    = "0x80d89a"
white   = "0xe0d5be"

[colors.selection]
background = "0x2a2a2a"
foreground = "0xd5c8a5"

[cursor]
style = "Block"

[font.bold]
family = "IosevkaTerm Nerd Font"
style = "Bold"

[font.italic]
family = "IosevkaTerm Nerd Font"
style = "Italic"

[font.normal]
family = "IosevkaTerm Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control"

[scrolling]
history = 10000
multiplier = 3

[terminal.shell]
args = ["--login", "-c", "tmux a 2>/dev/null || tmux"]
program = "/usr/bin/zsh"

[window]
decorations = "full"
opacity = 1.0
blur = false

[window.dimensions]
columns = 80
lines = 24

[window.padding]
x = 8
y = 8

[keyboard]
