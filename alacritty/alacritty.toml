# Neon Abyss
# Cyan #00DDB8 · Lime #7AF060 · Rose #FF6B8E · Green #32F08C
# bg: #0A1018  fg: #A8D8C8

[colors.primary]
background = "0x0a1018"
foreground = "0xa8d8c8"

[colors.normal]
black   = "0x060b0e"
red     = "0xf03060"
green   = "0x32f08c"
yellow  = "0xe8d040"
blue    = "0x00ddb8"
magenta = "0xff6b8e"
cyan    = "0x20c8b0"
white   = "0xa8d8c8"

[colors.bright]
black   = "0x3d6070"
red     = "0xf05070"
green   = "0x7af060"
yellow  = "0xf8e860"
blue    = "0x00f8d8"
magenta = "0xff90b0"
cyan    = "0x40e8d0"
white   = "0xc8eee0"

[colors.selection]
background = "0x1a3040"
foreground = "0xa8d8c8"

[cursor]
style = "Block"

[font.bold]
family = "IosevkaTerm Nerd Font"
style = "Bold"

[font.italic]
family = "IosevkaTerm Nerd Font"
style = "Italic"

[font.normal]
family = "IosevkaTerm Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control"

[scrolling]
history = 10000
multiplier = 3

[terminal.shell]
args = ["--login", "-c", "tmux a 2>/dev/null || tmux"]
program = "/usr/bin/zsh"

[window]
decorations = "full"
opacity = 0.92
blur = true

[window.dimensions]
columns = 80
lines = 24

[window.padding]
x = 8
y = 8

[keyboard]
