# ═══════════════════════════════════════════════════════════════════════════════
# Starship - Kanagawa Wave
# ═══════════════════════════════════════════════════════════════════════════════

format = """
$username$directory$git_branch$git_status$fill$cmd_duration$character"""

add_newline = false

[username]
style_user = "bold #7aa89f"
style_root = "bold #c34043"
format = "[$user]($style) "
show_always = true

[directory]
style = "bold #7e9cd8"
truncation_length = 3
truncate_to_repo = true
read_only = " "

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold #957fb8"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "#c34043"
conflicted = "!"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
untracked = " ?"
stashed = " $"
modified = " ~"
staged = " +"
renamed = " »"
deleted = " ✘"

[fill]
symbol = " "

[cmd_duration]
format = "[$duration]($style) "
style = "#c0a36e"
min_time = 2000

[character]
success_symbol = "[❯](#98bb6c bold)"
error_symbol = "[❯](#c34043 bold)"

[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[golang]
disabled = true

[rust]
disabled = true
