# ═══════════════════════════════════════════════════════════════════════════════
# Starship - Everforest saturado
# green: #98c870 · aqua: #68cc88 · orange: #e88462 · red: #e86262
# yellow: #dcb860 · purple: #d87fad
# ═══════════════════════════════════════════════════════════════════════════════

format = """
$username$directory$git_branch$git_status$cmd_duration$character"""

add_newline = false

[username]
style_user = "bold #68cc88"
style_root = "bold #e86262"
format = "[$user]($style) "
show_always = true

[directory]
style = "bold #98c870"
truncation_length = 3
truncate_to_repo = true
read_only = " "
read_only_style = "#e86262"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold #d87fad"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "#e86262"
conflicted = "!"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
untracked = " ?"
stashed = " $"
modified = " ~"
staged = " +"
renamed = " »"
deleted = " ✘"

[cmd_duration]
format = "[$duration]($style) "
style = "#dcb860"
min_time = 2000

[character]
success_symbol = "[❯](#68cc88 bold)"
error_symbol = "[❯](#e86262 bold)"

[package]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[golang]
disabled = true
[rust]
disabled = true
