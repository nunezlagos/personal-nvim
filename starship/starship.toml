# ═══════════════════════════════════════════════════════════════════════════════
# Starship - Neon Abyss
# Cyan · Lime · Rose · Green · Amber · Red
# ═══════════════════════════════════════════════════════════════════════════════

format = """
$username$directory$git_branch$git_status$cmd_duration$character"""

add_newline = false

[username]
style_user = "bold #00DDB8"
style_root = "bold #F03060"
format = "[$user]($style) "
show_always = true

[directory]
style = "bold #7AF060"
truncation_length = 3
truncate_to_repo = true
read_only = " "
read_only_style = "#F03060"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold #FF6B8E"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "#F03060"
conflicted = "!"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
untracked = " ?"
stashed = " $"
modified = " ~"
staged = " +"
renamed = " »"
deleted = " ✘"

[cmd_duration]
format = "[$duration]($style) "
style = "#E8D040"
min_time = 2000

[character]
success_symbol = "[❯](#00DDB8 bold)"
error_symbol = "[❯](#F03060 bold)"

[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[golang]
disabled = true

[rust]
disabled = true
