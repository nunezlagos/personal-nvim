# ═══════════════════════════════════════════════════════════════════════════════
# Starship - Trae Dark
# Paleta: #32F08C (verde/teal primario) · #38B0F0 (azul) · #A07AEF (violeta)
#         #F05A72 (rojo) · #EDD040 (amarillo) · #C5D8EA (fg) · #0A0E14 (bg)
# ═══════════════════════════════════════════════════════════════════════════════

format = """
$username$directory$git_branch$git_status$cmd_duration$character"""

add_newline = false

[username]
style_user = "bold #32F08C"
style_root = "bold #F05A72"
format = "[$user]($style) "
show_always = true

[directory]
style = "bold #38B0F0"
truncation_length = 3
truncate_to_repo = true
read_only = " "

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold #A07AEF"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "#F05A72"
conflicted = "!"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
untracked = " ?"
stashed = " $"
modified = " ~"
staged = " +"
renamed = " »"
deleted = " ✘"

[cmd_duration]
format = "[$duration]($style) "
style = "#EDD040"
min_time = 2000

[character]
success_symbol = "[❯](#32F08C bold)"
error_symbol = "[❯](#F05A72 bold)"

[fill]
symbol = " "

[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[golang]
disabled = true

[rust]
disabled = true
