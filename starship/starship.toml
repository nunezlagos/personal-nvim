# ═══════════════════════════════════════════════════════════════════════════════
# Starship - Everforest Dark
# bg: #272e33 · fg: #d3c6aa · green: #a7c080 · aqua: #83c092
# yellow: #dbbc7f · orange: #e69875 · red: #e67e80 · purple: #d699b6
# ═══════════════════════════════════════════════════════════════════════════════

format = """
$username$directory$git_branch$git_status$cmd_duration$character"""

add_newline = false

[username]
style_user = "bold #83c092"
style_root = "bold #e67e80"
format = "[$user]($style) "
show_always = true

[directory]
style = "bold #a7c080"
truncation_length = 3
truncate_to_repo = true
read_only = " "
read_only_style = "#e67e80"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold #d699b6"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "#e67e80"
conflicted = "!"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
untracked = " ?"
stashed = " $"
modified = " ~"
staged = " +"
renamed = " »"
deleted = " ✘"

[cmd_duration]
format = "[$duration]($style) "
style = "#dbbc7f"
min_time = 2000

[character]
success_symbol = "[❯](#83c092 bold)"
error_symbol = "[❯](#e67e80 bold)"

[package]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[golang]
disabled = true
[rust]
disabled = true
