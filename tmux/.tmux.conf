# ═══════════════════════════════════════════════════════════════════════════════
# TMUX - Obsidian
# Fondo neutro puro · Cyan #00C8A0 · Lime #78E030 · Rose #E04870
# bg: #0A0A0A | panel: #141414 | active: #1A2018 | border: #282A24
# ═══════════════════════════════════════════════════════════════════════════════

# Prefix
unbind C-b
set -g prefix C-a

# Atajos directos con Alt
bind -n M-n new-window
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-k kill-window
bind -n M-r command-prompt -I "rename-window "
bind -n M-S-q detach-client

# Escape rápido
set -g escape-time 0

# Barra de estado
set -g status-position bottom
set -g status-style bg='#0a0a0a',fg='#c4cdb8'

# Sin indicador de sesión
set -g status-left ""

# Tabs — solo nombre, sin número
# Inactivo: texto visible pero claramente apagado
set -g window-status-format         '#[bg=#141414]#[fg=#606858] #W '
# Activo: lime sobre fondo destacado
set -g window-status-current-format '#[bg=#1a2018]#[fg=#78e030,bold] #W #[bg=#0a0a0a]'
set -g window-status-separator      ""
set -g window-status-style          "bg=#0a0a0a,fg=#606858"

# Derecha: hora en cyan + prefijo en rose si activo
set -g status-right-length 40
set -g status-right '#{?client_prefix,#[bg=#e04870]#[fg=#0a0a0a] ⌨  ,}#[bg=#141414]#[fg=#00c8a0] %H:%M '

# Auto renombrar
set -g allow-rename on

# Números desde 1
set -g base-index 1
set -g pane-base-index 1

# Mouse
set -g mouse on

# Colores
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Vim-like nav
set -g mode-keys vi

# Copy mode
bind -n M-s copy-mode
bind -n M-c send-keys C-c

# En copy mode: seleccionar con v, copiar con y
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pane borders
set -g pane-border-style        fg='#282a24'
set -g pane-active-border-style fg='#00c8a0'

# Mensaje de status
set -g message-style bg='#1a2018',fg='#00c8a0'
set -g message-command-style bg='#1a2018',fg='#e04870'
