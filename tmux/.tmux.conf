# ═══════════════════════════════════════════════════════════════════════════════
# TMUX - Everforest Dark Hard
# bg: #272e33 · panel: #2e383c · active: #3d4a4f · border: #475258
# fg: #d3c6aa · green: #a7c080 · aqua: #83c092 · yellow: #dbbc7f · red: #e67e80
# ═══════════════════════════════════════════════════════════════════════════════

# Prefix
unbind C-b
set -g prefix C-a

# Atajos directos con Alt
bind -n M-n new-window
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-k kill-window
bind -n M-r command-prompt -I "rename-window "
bind -n M-S-q detach-client

# Escape rápido
set -g escape-time 0

# Barra de estado
set -g status-position bottom
set -g status-style bg='#272e33',fg='#d3c6aa'

# Sin indicador de sesión
set -g status-left ""

# Tabs — solo nombre, sin número
set -g window-status-format         '#[bg=#2e383c]#[fg=#7a8478] #W '
set -g window-status-current-format '#[bg=#3d4a4f]#[fg=#a7c080,bold] #W #[bg=#272e33]'
set -g window-status-separator      ""
set -g window-status-style          "bg=#272e33,fg=#7a8478"

# Derecha: hora en aqua + prefijo en red si activo
set -g status-right-length 40
set -g status-right '#{?client_prefix,#[bg=#e67e80]#[fg=#272e33] ⌨  ,}#[bg=#2e383c]#[fg=#83c092] %H:%M '

# Auto renombrar
set -g allow-rename on

# Números desde 1
set -g base-index 1
set -g pane-base-index 1

# Mouse
set -g mouse on

# Colores
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Vim-like nav
set -g mode-keys vi

# Copy mode
bind -n M-s copy-mode
bind -n M-c send-keys C-c

# En copy mode: seleccionar con v, copiar con y
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pane borders
set -g pane-border-style        fg='#475258'
set -g pane-active-border-style fg='#a7c080'

# Mensaje de status
set -g message-style bg='#3d4a4f',fg='#d3c6aa'
set -g message-command-style bg='#3d4a4f',fg='#dbbc7f'
