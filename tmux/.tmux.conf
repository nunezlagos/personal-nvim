# ═══════════════════════════════════════════════════════════════════════════════
# TMUX - Contraste moderado para queratocono (evitar halo/blur)
# bg: #0d0d0d · panel: #1a1a1a · active: #252525 · border: #303030
# fg: #e8e8e8 · green: #8fcf6f · cyan: #6fcfdf · yellow: #cfcf6f · red: #cf6f6f
# ═══════════════════════════════════════════════════════════════════════════════

# TPM - Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'dracula/tmux'

# Dracula settings - solo hora
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-plugins ""

# Status right - solo hora con timezone
set -g status-right-length 40
set -g status-right '#[fg=#bb9af7] %H:%M %z '

# Continuum - auto restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Inicializar TPM
run '~/.tmux/plugins/tpm/tpm'

# Prefix
unbind C-b
set -g prefix C-s

# Vim-like nav
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Reload
bind r source-file ~/.tmux.conf
bind -n M-t source-file ~/.tmux.conf

# Atajos directos con Alt

# Splits con Alt directo (sin modo comando)
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-b split-window -v -c "#{pane_current_path}"
bind -n M-x run-shell ~/Proyectos/tmux-kill-window-switch
bind -n M-n command-prompt -p "Window name:" "new-window -c '#{pane_current_path}' -n '%%'"
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-r command-prompt -I "rename-window "
bind -n M-S-q detach-client

# Sesiones
bind -n M-N command-prompt -p "Session name:" "new-session -s '%%'"
bind -n M-S choose-tree -Zs
bind -n M-d detach
bind -n M-a list-sessions
bind -n M-v command-prompt -I "switch-client -t "

# Escape rápido
set -g escape-time 0

# Barra de estado — Dracula maneja esto
set -g status-position bottom

# Auto renombrar
set -g allow-rename on
set -g remain-on-exit on

# Números desde 1
set -g base-index 1
set -g pane-base-index 1

# Mouse
set -g mouse on

# Colores
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Vim-like nav
set -g mode-keys vi

# Copy mode
bind -n M-s copy-mode
bind -n M-c send-keys C-c

# En copy mode: seleccionar con v, copiar con y
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pane borders
set -g pane-border-style        fg='#252525'
set -g pane-active-border-style fg='#8fcf6f'

# Mensaje de status
set -g message-style bg='#1a1a1a',fg='#e8e8e8'
set -g message-command-style bg='#1a1a1a',fg='#cfcf6f'
