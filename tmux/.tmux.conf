# ═══════════════════════════════════════════════════════════════════════════════
# TMUX - Neon Abyss
# Cyan #00DDB8 · Lime #7AF060 · Rose #FF6B8E · Green #32F08C
# bg: #0A1018 | panel: #0E1820 | active: #1A3040 | border: #224050
# ═══════════════════════════════════════════════════════════════════════════════

# Prefix
unbind C-b
set -g prefix C-a

# Atajos directos con Alt
bind -n M-n new-window
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-k kill-window
bind -n M-r command-prompt -I "rename-window "
bind -n M-S-q detach-client

# Escape rápido
set -g escape-time 0

# Barra de estado
set -g status-position bottom
set -g status-style bg='#0a1018',fg='#a8d8c8'

# Izquierda: sesión en cyan
set -g status-left-length 20
set -g status-left '#[bg=#0e1820]#[fg=#00ddb8,bold] #S #[bg=#0a1018] '

# Tabs inactivos: dim teal
set -g window-status-format         '#[bg=#0e1820]#[fg=#3d6070] #I:#W '
# Tab activo: cyan brillante con fondo highlighted
set -g window-status-current-format '#[bg=#1a3040]#[fg=#00ddb8,bold] #I:#W #[bg=#0a1018]'
set -g window-status-separator      ""
set -g window-status-style          "bg=#0a1018,fg=#3d6070"

# Derecha: hora en lime + indicador de prefijo en rose
set -g status-right-length 40
set -g status-right '#{?client_prefix,#[bg=#ff6b8e]#[fg=#060b0e] ⌨  ,}#[bg=#0e1820]#[fg=#7af060] %H:%M #[bg=#0a1018]'

# Auto renombrar
set -g allow-rename on

# Números desde 1
set -g base-index 1
set -g pane-base-index 1

# Mouse
set -g mouse on

# Colores
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Vim-like nav
set -g mode-keys vi

# Copy mode
bind -n M-s copy-mode
bind -n M-c send-keys C-c

# En copy mode: seleccionar con v, copiar con y
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pane borders
set -g pane-border-style        fg='#224050'
set -g pane-active-border-style fg='#00ddb8'

# Mensaje de status (comando en barra)
set -g message-style bg='#1a3040',fg='#00ddb8'
set -g message-command-style bg='#1a3040',fg='#ff6b8e'
