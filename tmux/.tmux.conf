# ═══════════════════════════════════════════════════════════════════════════════
# TMUX - Trae Dark
# Paleta: #32F08C (verde) · #38B0F0 (azul) · #A07AEF (violeta)
# bg: #0F1520 | elevated: #162030 | selection: #1E3048 | border: #2A3D55
# ═══════════════════════════════════════════════════════════════════════════════

# Prefix
unbind C-b
set -g prefix C-a

# Atajos directos con Alt
bind -n M-n new-window
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-k kill-window
bind -n M-r command-prompt -I "rename-window "
bind -n M-S-q detach-client

# Escape rápido
set -g escape-time 0

# Barra de estado
set -g status-position bottom
set -g status-style bg='#0f1520',fg='#c5d8ea'

# Sin lado izquierdo
set -g status-left ""

# Tabs
set -g window-status-format         '#[bg=#162030]#[fg=#4a6070] #W '
set -g window-status-current-format '#[bg=#1e3048]#[fg=#32f08c,bold] #W '
set -g window-status-separator      ""
set -g window-status-style          "bg=#0f1520,fg=#4a6070"

# Lado derecho
set -g status-right-length 30
set -g status-right '#[bg=#162030]#[fg=#38b0f0] %H:%M '

# Auto renombrar
set -g allow-rename on

# Números desde 1
set -g base-index 1
set -g pane-base-index 1

# Mouse
set -g mouse on

# Colores
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Vim-like nav
set -g mode-keys vi

# Copy mode
bind -n M-s copy-mode
bind -n M-c send-keys C-c

# En copy mode: seleccionar con v, copiar con y
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pane borders
set -g pane-border-style        fg='#2a3d55'
set -g pane-active-border-style fg='#32f08c'
