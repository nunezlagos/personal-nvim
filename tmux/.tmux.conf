# ═══════════════════════════════════════════════════════════════════════════════
# TMUX SIMPLE CONFIG
# ═══════════════════════════════════════════════════════════════════════════════

# Prefix
unbind C-b
set -g prefix C-a

# Atajos directos con Alt
bind -n M-n new-window           # Alt+n: Nuevo tab
bind -n M-h previous-window     # Alt+h: Tab anterior
bind -n M-l next-window         # Alt+l: Tab siguiente
bind -n M-Left previous-window  # Alt+←: Tab anterior
bind -n M-Right next-window      # Alt+→: Tab siguiente
bind -n M-k kill-window         # Alt+k: Cerrar tab
bind -n M-r command-prompt -I "rename-window "  # Alt+r: Renombrar
bind -n M-S-q detach-client     # Alt+Shift+q: Cerrar sesión

# Escape rápido
set -g escape-time 0

# Barra de estado estilo LazyVim
set -g status-position bottom
set -g status-style bg='#1A1B1D',fg='#E8E8EC'

# Sin lado izquierdo (no necesitamos sesión)
set -g status-left ""

# Tabs: solo nombre
set -g window-status-format '#[bg=#282830] #[fg=#9090A0]#W '
set -g window-status-current-format '#[bg=#354060] #[fg=#E8E8EC,bold]#W '
set -g window-status-separator ""
set -g window-status-style "bg=#1A1B1D,fg=#9090A0"

# Lado derecho
set -g status-right-length 30
set -g status-right '#[bg=#282830]#[fg=#6BB8FF] %H:%M '

# Auto renombrar
set -g allow-rename on

# Numéros de ventana starts from 1
set -g base-index 1
set -g pane-base-index 1

# Mouse off
set -g mouse off

# Colores
set -g default-terminal "tmux-256color"

# Vim-like nav in copy mode
set -g mode-keys vi
