# ═══════════════════════════════════════════════════════════════════════════════
# TMUX - Everforest Dark Hard
# bg: #272e33 · panel: #2e383c · active: #3d4a4f · border: #475258
# fg: #d3c6aa · green: #a7c080 · aqua: #83c092 · yellow: #dbbc7f · red: #e67e80
# ═══════════════════════════════════════════════════════════════════════════════

# Prefix
unbind C-b
set -g prefix C-a

# Atajos directos con Alt
bind -n M-n new-window
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-k kill-window
bind -n M-r command-prompt -I "rename-window "
bind -n M-S-q detach-client

# Escape rápido
set -g escape-time 0

# Barra de estado — fondo neutral, colores Everforest
set -g status-position bottom
set -g status-style bg='#141414',fg='#d3c6aa'

# Sin indicador de sesión
set -g status-left ""

# Tabs — solo nombre, sin número
set -g window-status-format         '#[bg=#222222]#[fg=#7a7a7a] #W '
set -g window-status-current-format '#[bg=#2a2a2a]#[fg=#98c870,bold] #W #[bg=#141414]'
set -g window-status-separator      ""
set -g window-status-style          "bg=#141414,fg=#7a7a7a"

# Derecha: hora en naranja (cálido, armoniza con verde del tab) · prefijo en rojo
set -g status-right-length 40
set -g status-right '#{?client_prefix,#[bg=#e86262]#[fg=#141414] ⌨  ,}#[bg=#222222]#[fg=#e88462] %H:%M '

# Auto renombrar
set -g allow-rename on

# Números desde 1
set -g base-index 1
set -g pane-base-index 1

# Mouse
set -g mouse on

# Colores
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Vim-like nav
set -g mode-keys vi

# Copy mode
bind -n M-s copy-mode
bind -n M-c send-keys C-c

# En copy mode: seleccionar con v, copiar con y
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pane borders
set -g pane-border-style        fg='#2a2a2a'
set -g pane-active-border-style fg='#98c870'

# Mensaje de status
set -g message-style bg='#222222',fg='#d3c6aa'
set -g message-command-style bg='#222222',fg='#dbbc7f'
